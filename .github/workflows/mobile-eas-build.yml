name: Mobile EAS Build

on:
  workflow_dispatch:
    inputs:
      profile:
        description: EAS build profile
        required: true
        default: preview
        type: choice
        options:
          - preview
          - production
      platform:
        description: Target platform
        required: true
        default: android
        type: choice
        options:
          - android
          - ios
          - all
  push:
    branches: [main]
    tags:
      - "android-v*"
    paths:
      - "apps/mobile/**"
      - "packages/**"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "package.json"
      - ".github/workflows/mobile-eas-build.yml"

concurrency:
  group: mobile-eas-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: EAS ${{ startsWith(github.ref, 'refs/tags/android-v') && 'android' || github.event.inputs.platform || 'android' }} (${{ startsWith(github.ref, 'refs/tags/android-v') && 'production' || github.event_name == 'push' && 'production' || github.event.inputs.profile || 'preview' }})
    runs-on: ubuntu-latest
    env:
      BUILD_PLATFORM: ${{ startsWith(github.ref, 'refs/tags/android-v') && 'android' || github.event.inputs.platform || 'android' }}
      BUILD_PROFILE: ${{ startsWith(github.ref, 'refs/tags/android-v') && 'production' || github.event_name == 'push' && 'production' || github.event.inputs.profile || 'preview' }}
      SUBMIT_PROFILE: ${{ startsWith(github.ref, 'refs/tags/android-v') && 'production' || github.event_name == 'push' && 'internal' || '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Validate Expo config
        working-directory: apps/mobile
        run: npx expo config --type public

      - name: Write Google Play service account
        if: ${{ env.SUBMIT_PROFILE != '' && env.BUILD_PLATFORM == 'android' }}
        working-directory: apps/mobile
        run: |
          test -n "${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}" || (echo "GOOGLE_PLAY_SERVICE_ACCOUNT_JSON secret is missing" && exit 1)
          cat > google-play-service-account.json <<'JSON'
          ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          JSON

      - name: Build with EAS
        working-directory: apps/mobile
        run: |
          eas build \
            --platform "$BUILD_PLATFORM" \
            --profile "$BUILD_PROFILE" \
            --non-interactive

      - name: Submit Android build to Google Play
        if: ${{ env.SUBMIT_PROFILE != '' && env.BUILD_PLATFORM == 'android' }}
        working-directory: apps/mobile
        run: |
          eas submit \
            --platform android \
            --profile "$SUBMIT_PROFILE" \
            --latest \
            --non-interactive
