# 🚀 SnapKO CI/CD Pipeline
# Tự động test, build và deploy khi push code lên main

name: 🔄 CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: # Cho phép chạy thủ công từ GitHub UI

# Chỉ chạy 1 workflow cùng lúc cho mỗi branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ═══════════════════════════════════════════════════════════════
  # JOB 1: Kiểm tra code (chạy cho mọi push/PR)
  # ═══════════════════════════════════════════════════════════════
  test:
    name: 🧪 Test & Lint
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: 📦 Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: 📦 Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-store-

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🔍 Type check
        run: pnpm typecheck
        continue-on-error: true

      - name: 🔍 Lint
        run: pnpm lint
        continue-on-error: true

      - name: ✅ Tests passed
        run: echo "All checks completed!"

  # ═══════════════════════════════════════════════════════════════
  # JOB 2: Deploy Supabase Edge Functions
  # ═══════════════════════════════════════════════════════════════
  deploy-functions:
    name: ☁️ Deploy Edge Functions
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: 🔗 Link project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: 🚀 Deploy all functions
        run: supabase functions deploy
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: ✅ Functions deployed
        run: echo "Edge Functions deployed successfully!"

  # ═══════════════════════════════════════════════════════════════
  # JOB 3: Build Mobile App (chỉ khi có thay đổi trong apps/mobile)
  # ═══════════════════════════════════════════════════════════════
  build-mobile:
    name: 📱 Build Mobile
    runs-on: ubuntu-latest
    needs: test
    if: |
      github.event_name == 'push' && 
      github.ref == 'refs/heads/main' &&
      contains(github.event.head_commit.message, '[mobile]')

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: 📦 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🔧 Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 🏗️ Build Android APK
        run: |
          cd apps/mobile
          eas build --platform android --profile preview --non-interactive

      - name: ✅ Mobile build complete
        run: echo "Mobile APK built! Check expo.dev for download link."

  # ═══════════════════════════════════════════════════════════════
  # Thông báo kết quả (tuỳ chọn)
  # ═══════════════════════════════════════════════════════════════
  notify:
    name: 📢 Notify
    runs-on: ubuntu-latest
    needs: [test, deploy-functions]
    if: always()

    steps:
      - name: 📊 Summary
        run: |
          echo "## 🚀 Deploy Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Test & Lint | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Edge Functions | ${{ needs.deploy-functions.result }} |" >> $GITHUB_STEP_SUMMARY
