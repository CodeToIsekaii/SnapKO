name: Desktop Windows Build

on:
  workflow_dispatch:
  push:
    tags:
      - "windows-v*"

jobs:
  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Write production desktop env
        shell: pwsh
        run: |
          @"
          VITE_SUPABASE_URL=https://kxeervlkzyitlbksbfvp.supabase.co
          VITE_SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt4ZWVydmxrenlpdGxia3NiZnZwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjYzMzQzNTcsImV4cCI6MjA4MTkxMDM1N30.8Nm7SxqobcRDrCJto1L6oZZeQJRlSYHfNjCiqNeQ_BM
          VITE_BACKEND_URL=https://api.snapko.io.vn
          "@ | Set-Content -Path apps/desktop/.env -Encoding utf8

      - name: Typecheck
        run: pnpm --filter desktop typecheck

      - name: Build Windows package
        run: pnpm --filter desktop build:win

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: snapko-desktop-windows-installer
          path: apps/desktop/dist-exes/**/SnapKO.Desktop.Setup.*.exe
          retention-days: 30

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/windows-v')
        uses: softprops/action-gh-release@v1
        with:
          draft: false
          generate_release_notes: true
          name: SnapKO Desktop ${{ github.ref_name }}
          files: apps/desktop/dist-exes/**/SnapKO.Desktop.Setup.*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
